<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  html, body {
    background: transparent !important;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    color: #fff;
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
  }
  
  .player {
    width: 100%;
    height: 100vh;
    background: #000 !important;
    border-radius: 0;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }
  
  #sc-iframe {
    width: 1px; height: 1px;
    position: absolute; opacity: 0; pointer-events: none;
  }
  
  /* Artwork sits as an absolute full-screen background */
  .art-hero {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    z-index: 1;
  }
  
  /* Force image to cover 100% of height and width */
  .art-hero img {
    width: 100% !important;
    height: 100% !important;
    object-fit: cover !important;
    object-position: center !important;
    display: block !important;
    transition: opacity 0.4s;
  }

  /* Smooth Gradient Fade over Artwork */
  .controls-container {
    position: relative;
    z-index: 2;
    width: 100%;
    padding-top: 60px;
    padding-bottom: 24px;
    background: linear-gradient(
      to bottom, 
      rgba(0, 0, 0, 0) 0%, 
      rgba(0, 0, 0, 0.25) 20%, 
      rgba(0, 0, 0, 0.65) 50%, 
      rgba(0, 0, 0, 0.9) 80%,
      rgba(0, 0, 0, 0.98) 100%
    );
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    mask-image: linear-gradient(to bottom, transparent 0%, black 25%);
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 25%);
  }
  
  .art-hero-text {
    position: relative;
    z-index: 3;
    padding: 0 20px 12px;
  }
  
  .track-title {
    font-size: 20px; font-weight: 700;
    letter-spacing: -0.3px; line-height: 1.2;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  
  .track-artist {
    font-size: 13px; color: rgba(255,255,255,0.7);
    margin-top: 4px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }
  
  .progress-section { 
    padding: 8px 20px 0; 
    flex-shrink: 0;
    position: relative;
    z-index: 3;
  }
  
  .progress-bar-wrap {
    width: 100%; height: 3px;
    background: rgba(255,255,255,0.25);
    border-radius: 2px; cursor: pointer; position: relative;
  }
  
  .progress-fill {
    height: 100%; background: #1a7a3a;
    border-radius: 2px; width: 0%;
    transition: width 0.5s linear; position: relative;
  }
  
  .progress-fill::after {
    content: '';
    position: absolute; right: -5px; top: -4px;
    width: 11px; height: 11px;
    background: #fff; border-radius: 50%;
  }
  
  .time-row {
    display: flex; justify-content: space-between;
    margin-top: 8px;
    font-size: 11px; color: rgba(255,255,255,0.6);
    font-variant-numeric: tabular-nums;
  }
  
  .controls {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 12px 32px 8px;
    flex-shrink: 0;
    position: relative;
    z-index: 3;
  }
  
  .ctrl-btn {
    background: none; border: none; cursor: pointer;
    color: rgba(255,255,255,0.85);
    display: flex; align-items: center; justify-content: center;
    transition: color 0.2s, transform 0.1s; padding: 8px;
  }
  
  .ctrl-btn:hover { color: #fff; }
  .ctrl-btn:active { transform: scale(0.9); }
  
  .ctrl-btn.play-pause {
    width: 56px; height: 56px;
    background: #fff; border-radius: 50%;
    color: #000;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  
  .ctrl-btn.play-pause:hover { background: #eee; color: #000; }
  
  .track-list {
    border-top: none !important;
    max-height: 150px; overflow-y: auto;
    scrollbar-width: none;
    flex-shrink: 0;
    position: relative;
    z-index: 3;
  }
  
  .track-list::-webkit-scrollbar { display: none; }
  
  .track-item {
    display: flex; align-items: center;
    padding: 10px 20px; gap: 12px;
    cursor: pointer; transition: background 0.15s;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  
  .track-item:hover { background: rgba(255,255,255,0.08); }
  .track-item.active { background: rgba(26,122,58,0.2); }
  
  .track-num {
    font-size: 12px; color: rgba(255,255,255,0.5);
    width: 18px; text-align: center; flex-shrink: 0;
  }
  
  .track-item.active .track-num { color: #23a04c; }
  
  .track-thumb {
    width: 36px; height: 36px;
    border-radius: 4px; object-fit: cover;
    background: #222; flex-shrink: 0;
  }
  
  .track-info { flex: 1; min-width: 0; }
  
  .track-name {
    font-size: 13px; font-weight: 500;
    white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; color: #fff;
  }
  
  .track-item.active .track-name { color: #23a04c; }
  
  .track-dur {
    font-size: 11px; color: rgba(255,255,255,0.5);
    flex-shrink: 0; font-variant-numeric: tabular-nums;
  }
  
  .loading-overlay {
    position: absolute; inset: 0;
    background: #0a0a0a;
    display: flex; align-items: center; justify-content: center;
    z-index: 10; flex-direction: column; gap: 12px;
  }
  
  .loading-dot {
    width: 8px; height: 8px;
    background: #1a7a3a; border-radius: 50%;
    animation: pulse 1.2s ease-in-out infinite;
  }
  
  @keyframes pulse {
    0%, 100% { opacity: 0.2; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
  }
  
  .loading-text { font-size: 12px; color: rgba(255,255,255,0.4); }
</style>
</head>
<body>

<div class="player">
  <div class="loading-overlay" id="loading">
    <div class="loading-dot"></div>
    <div class="loading-text">Loading...</div>
  </div>

  <iframe id="sc-iframe" src=""></iframe>

  <div class="art-hero">
    <img id="art-img" src="" alt="Album Art">
  </div>

  <div class="controls-container">
    <div class="art-hero-text">
      <div class="track-title" id="track-title">Loading...</div>
      <div class="track-artist" id="track-artist">ROCMINDS</div>
    </div>

    <div class="progress-section">
      <div class="progress-bar-wrap" id="progress-wrap">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="time-row">
        <span id="time-current">0:00</span>
        <span id="time-total">0:00</span>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="btn-prev">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="ctrl-btn play-pause" id="btn-play">
        <svg id="icon-play" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg id="icon-pause" width="26" height="26" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button class="ctrl-btn" id="btn-next">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18 14.5 12 6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg>
      </button>
    </div>

    <div class="track-list" id="track-list"></div>
  </div>
</div>

<script src="https://w.soundcloud.com/player/api.js"></script>
<script>
  const urlParams = new URLSearchParams(window.location.search);
  const rawParam = urlParams.get('url');
  let targetUrl = "https://soundcloud.com/rich-off-creative-minds/want-what-i-want-gunna-remix";
  if (rawParam) {
    try { targetUrl = decodeURIComponent(rawParam); } catch(e) { targetUrl = rawParam; }
  }

  const iframe = document.getElementById('sc-iframe');
  iframe.src = `https://w.soundcloud.com/player/?url=${encodeURIComponent(targetUrl)}&auto_play=false&buying=false&liking=false&download=false&sharing=false&show_artwork=false&show_comments=false&show_playcount=false&show_user=false&hide_related=true&visual=false`;

  const widget = SC.Widget(iframe);
  let duration = 0, tracks = [], currentIndex = 0;

  function fmt(ms) {
    if (!ms || isNaN(ms)) return '0:00';
    const s = Math.floor(ms / 1000);
    return Math.floor(s / 60) + ':' + (s % 60 < 10 ? '0' : '') + (s % 60);
  }

  function updateUI(sound) {
    if (!sound) return;
    document.getElementById('track-title').textContent = sound.title || '';
    document.getElementById('track-artist').textContent = sound.user?.username || 'ROCMINDS';
    if (sound.artwork_url) {
      document.getElementById('art-img').src = sound.artwork_url.replace('-large', '-t500x500');
    }
    duration = sound.duration || 0;
    document.getElementById('time-total').textContent = fmt(duration);
    document.querySelectorAll('.track-item').forEach((el, i) => {
      el.classList.toggle('active', i === currentIndex);
    });
  }

  function updateTrackRow(i, sound) {
    const row = document.getElementById(`track-item-${i}`);
    if (row && sound) {
      if (sound.title && sound.title !== 'undefined') {
        row.querySelector('.track-name').textContent = sound.title;
      }
      if (sound.duration) {
        row.querySelector('.track-dur').textContent = fmt(sound.duration);
      }
      if (sound.artwork_url) {
        row.querySelector('.track-thumb').src = sound.artwork_url.replace('-large', '-small');
      }
    }
  }

  function buildList(sounds) {
    const list = document.getElementById('track-list');
    list.innerHTML = '';

    if (!sounds || sounds.length <= 1) {
      list.style.display = 'none';
      return;
    }

    list.style.display = 'block';
    tracks = sounds;

    sounds.forEach((s, i) => {
      const el = document.createElement('div');
      el.className = 'track-item' + (i === currentIndex ? ' active' : '');
      el.id = `track-item-${i}`;
      
      const title = (s.title && s.title !== 'undefined') ? s.title : `Track ${i + 1}`;
      const dur = fmt(s.duration);
      const thumb = s.artwork_url ? s.artwork_url.replace('-large', '-small') : '';

      el.innerHTML = `
        <span class="track-num">${i + 1}</span>
        <img class="track-thumb" src="${thumb}" alt="">
        <div class="track-info"><div class="track-name">${title}</div></div>
        <span class="track-dur">${dur}</span>`;

      el.addEventListener('click', () => { 
        currentIndex = i;
        widget.skip(i); 
        widget.play(); 
      });
      list.appendChild(el);
    });
  }

  widget.bind(SC.Widget.Events.READY, () => {
    widget.getCurrentSound(sound => {
      if (sound) {
        updateUI(sound);
        document.getElementById('loading').style.display = 'none';
      }
    });

    widget.getSounds(sounds => {
      if (sounds && sounds.length > 1) {
        buildList(sounds);
      }
    });
  });

  widget.bind(SC.Widget.Events.PLAY, () => {
    document.getElementById('icon-play').style.display = 'none';
    document.getElementById('icon-pause').style.display = 'block';
    widget.getCurrentSoundIndex(i => { 
      currentIndex = i; 
      widget.getCurrentSound(sound => {
        if (sound) {
          tracks[i] = sound;
          updateUI(sound);
          updateTrackRow(i, sound);
        }
      });
    });
  });

  widget.bind(SC.Widget.Events.PAUSE, () => {
    document.getElementById('icon-play').style.display = 'block';
    document.getElementById('icon-pause').style.display = 'none';
  });

  widget.bind(SC.Widget.Events.PLAY_PROGRESS, e => {
    const pct = duration > 0 ? (e.currentPosition / duration) * 100 : 0;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('time-current').textContent = fmt(e.currentPosition);
  });

  document.getElementById('btn-play').addEventListener('click', () => widget.toggle());
  document.getElementById('btn-prev').addEventListener('click', () => widget.prev());
  document.getElementById('btn-next').addEventListener('click', () => widget.next());
  document.getElementById('progress-wrap').addEventListener('click', e => {
    const r = e.currentTarget.getBoundingClientRect();
    widget.seekTo(((e.clientX - r.left) / r.width) * duration);
  });
</script>
</body>
</html>
