<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: transparent !important;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    color: #fff;
    width: 100%; height: 100%;
    overflow: hidden;
  }

  #sc-iframe { width: 1px; height: 1px; position: absolute; opacity: 0; pointer-events: none; }

  .player {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
    background: transparent;
  }

  .content {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 14px 22px 22px;
  }

  .drag-handle {
    display: flex; justify-content: center;
    padding: 4px 0 10px;
    flex-shrink: 0;
  }
  .drag-handle span {
    width: 36px; height: 5px; border-radius: 3px;
    background: rgba(255,255,255,0.35);
  }

  /* Artwork — contained, never upscaled past native resolution */
  .art-wrap {
    flex: 1;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    min-height: 0;
    padding: 0 0 8px;
  }

  .art-card {
    width: min(68vw, 340px);
    aspect-ratio: 1 / 1;
    border-radius: 10px;
    overflow: hidden;
    background: #1a1a1a;
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
  }

  .art-card img {
    width: 100%; height: 100%;
    object-fit: contain;
    object-position: center;
    display: block;
    image-rendering: -webkit-optimize-contrast;
    background: #111;
  }

  /* Title row */
  .title-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    padding: 6px 2px 0;
    flex-shrink: 0;
  }

  .title-text { min-width: 0; flex: 1; }

  .track-title {
    font-size: 21px; font-weight: 700;
    letter-spacing: -0.2px; line-height: 1.25;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .track-artist {
    font-size: 14px; color: rgba(255,255,255,0.65);
    margin-top: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .title-icons { display: flex; gap: 14px; flex-shrink: 0; padding-top: 2px; }
  .title-icons .icon-btn { padding: 2px; opacity: 0.85; }
  .title-icons .icon-btn.active { color: #fa2138; opacity: 1; }

  .icon-btn {
    background: none; border: none; cursor: pointer;
    color: #fff; display: flex; align-items: center; justify-content: center;
    transition: opacity 0.15s, transform 0.1s;
  }
  .icon-btn:active { transform: scale(0.9); }

  /* Progress */
  .progress-section { padding: 18px 2px 0; flex-shrink: 0; }

  .progress-bar-wrap {
    width: 100%; height: 4px;
    background: rgba(255,255,255,0.28);
    border-radius: 2px; cursor: pointer; position: relative;
  }
  .progress-fill {
    height: 100%; background: #fff;
    border-radius: 2px; width: 0%;
    position: relative;
  }
  .progress-fill::after {
    content: '';
    position: absolute; right: -6px; top: -4px;
    width: 12px; height: 12px;
    background: #fff; border-radius: 50%;
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  .time-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 8px;
    font-size: 12px; color: rgba(255,255,255,0.6);
    font-variant-numeric: tabular-nums;
  }
  .time-row .center-label {
    font-size: 12px; color: rgba(255,255,255,0.5);
    display: flex; align-items: center; gap: 4px;
  }

  /* Transport */
  .transport {
    display: flex; align-items: center;
    justify-content: center;
    gap: 34px;
    padding: 18px 6px 0;
    flex-shrink: 0;
  }

  .ctrl-btn {
    background: none; border: none; cursor: pointer;
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.1s; padding: 8px;
  }
  .ctrl-btn:active { transform: scale(0.88); }

  /* Volume */
  .volume-row {
    display: flex; align-items: center; gap: 10px;
    padding: 20px 2px 0;
    flex-shrink: 0;
  }
  .volume-row .icon-btn { opacity: 0.6; flex-shrink: 0; }
  .volume-slider {
    flex: 1; height: 4px; border-radius: 2px;
    background: rgba(255,255,255,0.28);
    position: relative; cursor: pointer;
  }
  .volume-fill {
    height: 100%; width: 100%; border-radius: 2px;
    background: rgba(255,255,255,0.85);
    position: relative;
  }
  .volume-fill::after {
    content: '';
    position: absolute; right: -5px; top: -3px;
    width: 10px; height: 10px;
    background: #fff; border-radius: 50%;
  }

  /* Bottom icon row */
  .bottom-row {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 22px 8px 4px;
    flex-shrink: 0;
  }
  .bottom-row .icon-btn { opacity: 0.75; padding: 6px; }
  .bottom-row .icon-btn.active { opacity: 1; color: #fa2138; }

  /* Track list drawer */
  .track-list-drawer {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    max-height: 60%;
    background: rgba(12,10,9,0.97);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top-left-radius: 18px;
    border-top-right-radius: 18px;
    transform: translateY(100%);
    transition: transform 0.3s ease;
    z-index: 5;
    display: flex; flex-direction: column;
  }
  .track-list-drawer.open { transform: translateY(0); }
  .drawer-handle { display: flex; justify-content: center; padding: 10px 0 4px; cursor: pointer; }
  .drawer-handle span { width: 36px; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.3); }
  .drawer-title { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.5px; padding: 4px 20px 8px; }
  .track-list { overflow-y: auto; scrollbar-width: none; padding-bottom: 10px; }
  .track-list::-webkit-scrollbar { display: none; }
  .track-item { display: flex; align-items: center; padding: 10px 20px; gap: 12px; cursor: pointer; transition: background 0.15s; }
  .track-item:hover { background: rgba(255,255,255,0.08); }
  .track-item.active .track-name { color: #fa2138; }
  .track-num { font-size: 12px; color: rgba(255,255,255,0.5); width: 18px; text-align: center; flex-shrink: 0; }
  .track-item.active .track-num { color: #fa2138; }
  .track-thumb { width: 38px; height: 38px; border-radius: 5px; object-fit: cover; background: #222; flex-shrink: 0; }
  .track-info { flex: 1; min-width: 0; }
  .track-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
  .track-dur { font-size: 11px; color: rgba(255,255,255,0.5); flex-shrink: 0; font-variant-numeric: tabular-nums; }

  .loading-overlay {
    position: absolute; inset: 0;
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    z-index: 10; flex-direction: column; gap: 12px;
  }
  .loading-dot { width: 8px; height: 8px; background: #fa2138; border-radius: 50%; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 0.2; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }
  .loading-text { font-size: 12px; color: rgba(255,255,255,0.4); }
</style>
</head>
<body>

<div class="player">
  <div class="loading-overlay" id="loading">
    <div class="loading-dot"></div>
    <div class="loading-text">Loading...</div>
  </div>

  <iframe id="sc-iframe" src=""></iframe>

  <div class="content">
    <div class="drag-handle"><span></span></div>

    <div class="art-wrap">
      <div class="art-card">
        <img id="art-img" src="" alt="Album Art">
      </div>
    </div>

    <div class="title-row">
      <div class="title-text">
        <div class="track-title" id="track-title">Loading...</div>
        <div class="track-artist" id="track-artist">ROCMINDS</div>
      </div>
      <div class="title-icons">
        <button class="icon-btn" id="btn-star" aria-label="Favorite">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        </button>
        <button class="icon-btn" id="btn-more" aria-label="More">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="19" cy="12" r="1.8"/></svg>
        </button>
      </div>
    </div>

    <div class="progress-section">
      <div class="progress-bar-wrap" id="progress-wrap">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="time-row">
        <span id="time-current">0:00</span>
        <span id="time-remaining">-0:00</span>
      </div>
    </div>

    <div class="transport">
      <button class="ctrl-btn" id="btn-prev" aria-label="Previous">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="ctrl-btn" id="btn-play" aria-label="Play/Pause">
        <svg id="icon-play" width="52" height="52" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg id="icon-pause" width="52" height="52" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button class="ctrl-btn" id="btn-next" aria-label="Next">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18 14.5 12 6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg>
      </button>
    </div>

    <div class="volume-row">
      <button class="icon-btn" id="btn-mute" aria-label="Mute">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 10v4h4l5 5V5L7 10H3z"/></svg>
      </button>
      <div class="volume-slider" id="volume-wrap">
        <div class="volume-fill" id="volume-fill"></div>
      </div>
      <button class="icon-btn" id="btn-vol-max" aria-label="Volume">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3 10v4h4l5 5V5L7 10H3zm13.5 2A4.5 4.5 0 0 0 14 7.97v8.05A4.48 4.48 0 0 0 16.5 12z"/></svg>
      </button>
    </div>

    <div class="bottom-row">
      <button class="icon-btn" id="btn-lyrics" aria-label="Lyrics">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </button>
      <button class="icon-btn" id="btn-cast" aria-label="Devices">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9a9 9 0 0 1 9 9"/><path d="M2 4a14 14 0 0 1 14 14"/><circle cx="4" cy="18" r="1.6" fill="currentColor" stroke="none"/></svg>
      </button>
      <button class="icon-btn" id="btn-queue" aria-label="Queue">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
      </button>
    </div>
  </div>

  <div class="track-list-drawer" id="track-drawer">
    <div class="drawer-handle" id="drawer-close"><span></span></div>
    <div class="drawer-title">Up next</div>
    <div class="track-list" id="track-list"></div>
  </div>
</div>

<script src="https://w.soundcloud.com/player/api.js"></script>
<script>
  const urlParams = new URLSearchParams(window.location.search);
  const rawParam = urlParams.get('url');
  let targetUrl = "https://soundcloud.com/rich-off-creative-minds/want-what-i-want-gunna-remix";
  if (rawParam) {
    try { targetUrl = decodeURIComponent(rawParam); } catch(e) { targetUrl = rawParam; }
  }

  const iframe = document.getElementById('sc-iframe');
  iframe.src = `https://w.soundcloud.com/player/?url=${encodeURIComponent(targetUrl)}&auto_play=false&buying=false&liking=false&download=false&sharing=false&show_artwork=false&show_comments=false&show_playcount=false&show_user=false&hide_related=true&visual=false`;

  const widget = SC.Widget(iframe);
  let duration = 0, tracks = [], currentIndex = 0, muted = false, lastVolume = 100;

  function fmt(ms) {
    if (!ms || isNaN(ms)) return '0:00';
    const s = Math.floor(ms / 1000);
    return Math.floor(s / 60) + ':' + (s % 60 < 10 ? '0' : '') + (s % 60);
  }
  function fmtRemaining(ms) {
    if (!ms || isNaN(ms)) return '-0:00';
    return '-' + fmt(ms);
  }

  // Highest-resolution artwork SoundCloud serves, shown contained (never upscaled/blurred)
  function highResArt(url) {
    return url.replace('-large', '-t500x500');
  }

  function updateUI(sound) {
    if (!sound) return;
    if (sound.title && sound.title !== 'undefined') {
      document.getElementById('track-title').textContent = sound.title;
    }
    document.getElementById('track-artist').textContent = sound.user?.username || 'ROCMINDS';
    if (sound.artwork_url) {
      const hi = highResArt(sound.artwork_url);
      document.getElementById('art-img').src = hi;
    }
    duration = sound.duration || 0;
    document.querySelectorAll('.track-item').forEach((el, i) => {
      el.classList.toggle('active', i === currentIndex);
    });
  }

  function updateTrackRow(i, sound) {
    const row = document.getElementById(`track-item-${i}`);
    if (row && sound) {
      if (sound.title && sound.title !== 'undefined') row.querySelector('.track-name').textContent = sound.title;
      if (sound.duration && !isNaN(sound.duration)) row.querySelector('.track-dur').textContent = fmt(sound.duration);
      if (sound.artwork_url) row.querySelector('.track-thumb').src = sound.artwork_url.replace('-large', '-small');
    }
  }

  function buildList(sounds) {
    const list = document.getElementById('track-list');
    list.innerHTML = '';
    if (!sounds || sounds.length <= 1) {
      document.getElementById('btn-queue').style.display = 'none';
      return;
    }
    tracks = sounds;
    sounds.forEach((s, i) => {
      const el = document.createElement('div');
      el.className = 'track-item' + (i === currentIndex ? ' active' : '');
      el.id = `track-item-${i}`;
      const title = (s.title && s.title !== 'undefined') ? s.title : 'Loading track...';
      const dur = (s.duration && !isNaN(s.duration)) ? fmt(s.duration) : '--:--';
      const thumb = s.artwork_url ? s.artwork_url.replace('-large', '-small') : '';
      el.innerHTML = `
        <span class="track-num">${i + 1}</span>
        <img class="track-thumb" src="${thumb}" alt="">
        <div class="track-info"><div class="track-name">${title}</div></div>
        <span class="track-dur">${dur}</span>`;
      el.addEventListener('click', () => {
        currentIndex = i;
        widget.skip(i);
        widget.play();
        closeDrawer();
      });
      list.appendChild(el);
    });
  }

  widget.bind(SC.Widget.Events.READY, () => {
    widget.getCurrentSound(sound => {
      if (sound) {
        updateUI(sound);
        document.getElementById('loading').style.display = 'none';
      }
    });
    widget.getSounds(sounds => {
      if (sounds && sounds.length > 1) buildList(sounds);
    });
  });

  widget.bind(SC.Widget.Events.PLAY, () => {
    document.getElementById('icon-play').style.display = 'none';
    document.getElementById('icon-pause').style.display = 'block';
    widget.getCurrentSoundIndex(i => {
      currentIndex = i;
      widget.getCurrentSound(sound => {
        if (sound) {
          tracks[i] = sound;
          updateUI(sound);
          updateTrackRow(i, sound);
        }
      });
    });
  });

  widget.bind(SC.Widget.Events.PAUSE, () => {
    document.getElementById('icon-play').style.display = 'block';
    document.getElementById('icon-pause').style.display = 'none';
  });

  widget.bind(SC.Widget.Events.PLAY_PROGRESS, e => {
    const pct = duration > 0 ? (e.currentPosition / duration) * 100 : 0;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('time-current').textContent = fmt(e.currentPosition);
    document.getElementById('time-remaining').textContent = fmtRemaining(duration - e.currentPosition);
  });

  document.getElementById('btn-play').addEventListener('click', () => widget.toggle());
  document.getElementById('btn-prev').addEventListener('click', () => widget.prev());
  document.getElementById('btn-next').addEventListener('click', () => widget.next());
  document.getElementById('progress-wrap').addEventListener('click', e => {
    const r = e.currentTarget.getBoundingClientRect();
    widget.seekTo(((e.clientX - r.left) / r.width) * duration);
  });

  // Volume
  const volFill = document.getElementById('volume-fill');
  document.getElementById('volume-wrap').addEventListener('click', e => {
    const r = e.currentTarget.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
    widget.setVolume(pct * 100);
    volFill.style.width = (pct * 100) + '%';
    muted = pct === 0;
  });
  document.getElementById('btn-mute').addEventListener('click', () => {
    muted = !muted;
    widget.setVolume(muted ? 0 : lastVolume);
    volFill.style.width = muted ? '0%' : lastVolume + '%';
  });

  // Favorite toggle (visual only — SoundCloud's public widget API has no account-level like action)
  document.getElementById('btn-star').addEventListener('click', function() {
    this.classList.toggle('active');
  });

  // Track list drawer
  const drawer = document.getElementById('track-drawer');
  function openDrawer() { drawer.classList.add('open'); }
  function closeDrawer() { drawer.classList.remove('open'); }
  document.getElementById('btn-queue').addEventListener('click', openDrawer);
  document.getElementById('btn-lyrics').addEventListener('click', openDrawer);
  document.getElementById('drawer-close').addEventListener('click', closeDrawer);
</script>
</body>
</html>
